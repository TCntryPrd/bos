# Applied only when the customer's base compose already defines `weaviate`.
# This turns the local vector store into an authenticated backend; the API is
# the sole application-layer gateway for memory writes and searches.
services:
  weaviate:
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "false"
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: ${WEAVIATE_API_KEY:?WEAVIATE_API_KEY is required}
      AUTHENTICATION_APIKEY_USERS: boss-api

# IR Custom AIOS v2 — nginx config for React SPA
# Serves static bundle, routes all non-file paths to index.html (client-side routing).
# /api/ is proxied to the `api` docker service (port 8001) on the same compose
# network. Using the compose DNS name (not host.docker.internal:8010) keeps the
# web container pinned to the CI-built, deploy-tagged API image — eliminating
# host-native / container dist drift (see v1.5.1).
# In multi-tenant mode, Traefik handles routing before nginx sees the request.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Serve pre-compressed assets if they exist (Vite generates .gz/.br)
    gzip_static on;

    # Cache static assets aggressively (Vite uses content-hashed filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API requests to the `api` docker service (CI-built, versioned).
    # The host-native boss-agent.service on :8010 still runs for host-only
    # jobs (tmux-backed rascals, cron-fired scripts), but nginx never routes
    # browser traffic to it. Drift between container and host-native can no
    # longer surface as /api 404s.
    location /api/coo/ {
        proxy_pass http://host.docker.internal:8090/api/coo/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
    location /api/ {
        proxy_pass http://api:8001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_read_timeout 300s;  # Long timeout for streaming/tool chains
        # SSE support
        proxy_buffering off;
        proxy_cache off;
    }

    # n8n editor proxy — allows iframe embedding for workspace view
    location /n8n-embed/ {
        proxy_pass http://host.docker.internal:5678/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Strip ALL frame-blocking headers (both from n8n AND our own global headers)
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        # Override our global X-Frame-Options for this location
        add_header X-Frame-Options "" always;
        add_header Content-Security-Policy "" always;
    }

    # Health check endpoint for Docker healthcheck and load balancers
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # React Router: all other paths fall through to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# IR Custom AIOS IR White-Label — nginx config
# Serves React SPA, routes /api/ to API container

# WebSocket upgrade mapping (used by the Hermes gateway proxy below).
map $http_upgrade $gw_connection_upgrade {
    default upgrade;
    ''      close;
}

# Hermes gateway console — reverse-proxies the local `hermes dashboard`
# (hermes-api:9119) at its own subdomain origin so its absolute /assets, /api/* and
# /ws all resolve. Every request is gated by the BOS-login cookie via
# auth_request → the API's /api/gw/check (mint the cookie at /api/gw/grant).
server {
    listen 80;
    server_name gateway.ircustomdashboards.tech;

    # Resolve the api container per-request via Docker DNS — a static
    # proxy_pass pins the upstream IP at nginx startup, so an api recreate
    # 502s every /api call until web restarts.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location = /__gwcheck {
        internal;
        set $gw_api hermes-api;
        proxy_pass http://$gw_api:8001/api/gw/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Host $host;
    }

    location / {
        auth_request /__gwcheck;
        error_page 401 = @gw_denied;
        set $gw_console hermes-api;
        proxy_pass http://$gw_console:9119;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $gw_connection_upgrade;
        proxy_read_timeout 1800s;
        proxy_buffering off;
    }

    location @gw_denied {
        return 302 https://app.ircustomdashboards.tech/;
    }
}

server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 64m;
    # Per-request upstream resolution (see note in the gateway block above).
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Serve pre-compressed assets if they exist
    gzip_static on;

    # Compatibility for any browser holding the old relative-path index.html.
    location ~ ^/setup(?:/claude-auth)?/assets/(.+)$ {
        expires 1y;
        add_header Cache-Control "no-cache";
        try_files /assets/$1 =404;
    }

    location ~ ^/setup(?:/claude-auth)?/(customaios\.png)$ {
        expires 1y;
        add_header Cache-Control "no-cache";
        try_files /$1 =404;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # Proxy API requests to the api container
    location /api/ {
        set $api_upstream hermes-api;
        # No URI part: with a variable upstream nginx would substitute the
        # location match; passing the original URI keeps /api/... intact.
        proxy_pass http://$api_upstream:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 1800s;
        # SSE support
        proxy_buffering off;
        proxy_cache off;
    }

    # SPA fallback
    location / {
        add_header Cache-Control "no-store" always;
        try_files $uri /index.html;
    }
}

# Grafana provisioning — Prometheus datasource
# This file is loaded automatically on Grafana start.
# Do not edit via the UI — changes here take effect after container restart.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    # Resolves via Docker DNS when using docker-compose.monitoring.yml
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      # Match the global scrape interval in prometheus.yml
      timeInterval: 15s
      # Enable exemplars for tracing integration (optional, future)
      exemplarTraceIdDestinations: []
    editable: false

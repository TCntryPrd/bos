# IR Custom AIOS v2 — Redis Configuration
# Event bus (Streams) + Cache + Pub/Sub

# --- Network ---
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# --- Memory ---
maxmemory 256mb
maxmemory-policy allkeys-lru

# --- Persistence (AOF for durability of Streams) ---
appendonly yes
appendfilename "boss.aof"
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshots as safety net
save 900 1
save 300 10
save 60 10000
dbfilename boss.rdb

# --- Streams Configuration ---
# Max stream length (auto-trim oldest entries)
# Configured per-stream via application code using XADD MAXLEN ~
# Default: keep last 10000 entries per stream

# --- Logging ---
loglevel notice
logfile ""

# --- Security ---
# Password set via REDIS_PASSWORD env var at runtime
# requirepass is injected by entrypoint if REDIS_PASSWORD is set

# --- Performance ---
hz 10
dynamic-hz yes
aof-use-rdb-preamble yes

# --- Streams consumer group defaults ---
# Consumer groups created by application:
#   boss:events:{tenant_id}     — main event bus (brain requests, connector events)
#   boss:jobs:{tenant_id}       — background job queue (worker consumption)
#   boss:health                 — health check events (global)
#   boss:backup                 — backup coordination events (global)
#
# Cache key patterns:
#   boss:cache:{tenant_id}:*    — tenant-scoped cache entries
#   boss:session:{session_id}   — session data
#   boss:rate:{tenant_id}:*     — rate limiting counters
#
# Pub/Sub channels:
#   boss:realtime:{tenant_id}   — real-time UI updates
#   boss:voice:{device_id}      — voice device coordination
